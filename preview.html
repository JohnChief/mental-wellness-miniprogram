<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>幸福服务站一期工程演示原型</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --ink: #1d2430;
      --muted: #667085;
      --line: #d9e0e8;
      --green: #24745c;
      --green-soft: #e7f3ed;
      --blue: #2f63c7;
      --blue-soft: #e9f0ff;
      --amber: #b86b10;
      --amber-soft: #fff4df;
      --red: #b42318;
      --red-soft: #fff0ed;
      --shadow: 0 16px 38px rgba(23, 32, 44, 0.10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #101828;
      color: #fff;
      box-shadow: 0 8px 22px rgba(16, 24, 40, 0.18);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #f4b740;
      color: #1f2937;
      font-weight: 900;
    }

    .brand-title {
      font-size: 17px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-subtitle {
      color: #cbd5e1;
      font-size: 12px;
      margin-top: 1px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-actions button,
    .nav-item,
    .btn,
    .icon-btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .top-actions button {
      padding: 8px 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.18);
      font-weight: 800;
    }

    .top-actions button.active {
      background: #fff;
      color: #101828;
    }

    .workspace {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 320px;
      gap: 16px;
      padding: 16px;
      align-items: start;
    }

    .sidebar,
    .stage,
    .inspector {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar,
    .inspector {
      position: sticky;
      top: 80px;
      max-height: calc(100vh - 96px);
      overflow: auto;
    }

    .panel-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
      font-weight: 900;
    }

    .nav {
      padding: 10px;
    }

    .nav-group {
      margin: 12px 8px 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px;
      margin: 3px 0;
      text-align: left;
      font-weight: 800;
      background: transparent;
      color: #344054;
    }

    .nav-item:hover {
      background: #f3f6f9;
    }

    .nav-item.active {
      background: var(--green-soft);
      color: #145943;
      border-color: #b9dccc;
    }

    .nav-index {
      width: 28px;
      height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      background: #eef2f6;
      color: #475467;
      font-size: 12px;
      flex: none;
    }

    .nav-item.active .nav-index {
      background: #cce8da;
      color: #145943;
    }

    .stage {
      min-height: calc(100vh - 96px);
      padding: 18px;
      overflow: hidden;
    }

    .stage-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px dashed var(--line);
      margin-bottom: 16px;
    }

    .stage-title h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
    }

    .stage-title p {
      margin: 7px 0 0;
      color: var(--muted);
      max-width: 760px;
      font-size: 14px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 8px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #475467;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.green { background: var(--green-soft); border-color: #b9dccc; color: #145943; }
    .badge.blue { background: var(--blue-soft); border-color: #c6d6ff; color: #244ca3; }
    .badge.amber { background: var(--amber-soft); border-color: #f6d596; color: #934d08; }
    .badge.red { background: var(--red-soft); border-color: #ffd0c7; color: var(--red); }

    .inspector-body {
      padding: 16px;
      font-size: 13px;
      color: #344054;
    }

    .inspector-body h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }

    .inspector-body p {
      margin: 0 0 13px;
      color: var(--muted);
    }

    .inspector-body ul {
      padding-left: 18px;
      margin: 8px 0 16px;
    }

    .inspector-body li {
      margin: 5px 0;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .metric,
    .card,
    .phone-card,
    .admin-card,
    .flow-node,
    .note-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .metric {
      padding: 14px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 950;
      letter-spacing: 0;
    }

    .metric-foot {
      margin-top: 3px;
      color: var(--green);
      font-size: 12px;
      font-weight: 800;
    }

    .overview-layout {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 14px;
      align-items: start;
    }

    .card {
      padding: 16px;
      margin-bottom: 14px;
    }

    .card h2,
    .admin-card h2,
    .phone-card h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .card p {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .flow {
      display: flex;
      align-items: stretch;
      gap: 8px;
      flex-wrap: wrap;
    }

    .flow-node {
      min-width: 130px;
      flex: 1;
      padding: 12px;
      background: #fbfcfe;
    }

    .flow-node strong {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
    }

    .flow-node span {
      color: var(--muted);
      font-size: 12px;
    }

    .scope-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .scope-item {
      border: 1px solid var(--line);
      border-left: 4px solid var(--green);
      border-radius: var(--radius);
      padding: 10px;
      background: #fbfcfe;
    }

    .scope-item strong {
      display: block;
      margin-bottom: 3px;
    }

    .scope-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .phone-row {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
    }

    .phone {
      width: 392px;
      border: 12px solid #111827;
      border-radius: 32px;
      background: #111827;
      box-shadow: 0 28px 54px rgba(16, 24, 40, 0.22);
      overflow: hidden;
      flex: none;
    }

    .phone-screen {
      height: 742px;
      background: #f8fbfa;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }

    .statusbar {
      height: 28px;
      padding: 6px 14px 0;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #111827;
      background: #fff;
    }

    .mini-title {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid #e7edf3;
      background: #fff;
      font-size: 17px;
      font-weight: 950;
      position: relative;
    }

    .back {
      position: absolute;
      left: 12px;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: #475467;
      cursor: pointer;
    }

    .mini-body {
      height: 594px;
      overflow: auto;
      padding: 14px 14px 86px;
    }

    .mini-tabs {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 72px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: #fff;
      border-top: 1px solid #e7edf3;
    }

    .mini-tab {
      display: grid;
      place-items: center;
      gap: 1px;
      color: #667085;
      font-size: 12px;
      cursor: pointer;
    }

    .mini-tab b {
      font-size: 19px;
      line-height: 1;
    }

    .mini-tab.active {
      color: var(--green);
      font-weight: 950;
    }

    .hero {
      padding: 16px;
      border: 1px solid #b9dccc;
      border-radius: var(--radius);
      background: #f4fbf7;
      margin-bottom: 12px;
    }

    .hero h2 {
      margin: 0 0 6px;
      font-size: 25px;
      line-height: 1.2;
    }

    .hotline-number {
      font-size: 25px;
      font-weight: 950;
      color: var(--amber);
      letter-spacing: 0;
    }

    .primary-call {
      width: 100%;
      min-height: 54px;
      margin-top: 12px;
      border: 0;
      border-radius: var(--radius);
      background: var(--green);
      color: #fff;
      font-size: 18px;
      font-weight: 950;
      cursor: pointer;
    }

    .phone-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .phone-card {
      min-height: 118px;
      padding: 12px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(16, 24, 40, 0.04);
    }

    .phone-card:hover,
    .admin-card:hover {
      border-color: #9ecfbc;
    }

    .phone-card .symbol {
      font-size: 25px;
      margin-bottom: 6px;
    }

    .phone-card h3 {
      margin: 0 0 5px;
      font-size: 15px;
    }

    .phone-card p,
    .admin-card p,
    .small {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .section-title {
      margin: 14px 0 8px;
      font-size: 15px;
      font-weight: 950;
    }

    .list-item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      margin-bottom: 9px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .row + .row {
      margin-top: 8px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .status.todo { background: var(--amber-soft); color: #934d08; }
    .status.doing { background: var(--blue-soft); color: #244ca3; }
    .status.done { background: var(--green-soft); color: #145943; }
    .status.risk { background: var(--red-soft); color: var(--red); }

    .btn {
      min-height: 36px;
      padding: 7px 10px;
      font-weight: 900;
      background: #fff;
    }

    .btn.primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .btn.blue {
      background: var(--blue-soft);
      border-color: #c6d6ff;
      color: #244ca3;
    }

    .btn.warn {
      background: var(--amber-soft);
      border-color: #f6d596;
      color: #934d08;
    }

    .btn.red {
      background: var(--red-soft);
      border-color: #ffd0c7;
      color: var(--red);
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .field {
      margin-bottom: 11px;
    }

    .field label {
      display: block;
      margin-bottom: 5px;
      color: #344054;
      font-size: 13px;
      font-weight: 900;
    }

    .fake-input,
    .fake-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: #475467;
    }

    .fake-input {
      height: 40px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .fake-textarea {
      min-height: 78px;
      padding: 10px;
    }

    .call-screen {
      min-height: 395px;
      display: grid;
      place-items: center;
      padding: 22px;
      border-radius: var(--radius);
      background: #111827;
      color: #fff;
      text-align: center;
    }

    .call-avatar {
      width: 92px;
      height: 92px;
      margin: 0 auto 16px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #e9f0ff;
      color: var(--blue);
      font-size: 34px;
      font-weight: 950;
    }

    .call-actions {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 24px;
    }

    .icon-btn {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      font-size: 22px;
    }

    .icon-btn.hang {
      border-color: #ef4444;
      background: #ef4444;
      color: #fff;
    }

    .side-note {
      width: 360px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      flex: none;
    }

    .note-box {
      padding: 10px;
      margin-top: 10px;
      background: #fbfcfe;
      color: #475467;
      font-size: 13px;
    }

    .admin-shell {
      min-width: 850px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #f8fafc;
    }

    .admin-top {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: #111827;
      color: #fff;
    }

    .admin-top span {
      color: #cbd5e1;
      font-size: 12px;
    }

    .admin-main {
      display: grid;
      grid-template-columns: 210px 1fr;
      min-height: 620px;
    }

    .admin-menu {
      border-right: 1px solid var(--line);
      background: #fff;
      padding: 10px;
    }

    .admin-menu button {
      width: 100%;
      min-height: 38px;
      margin: 2px 0;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: #475467;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
    }

    .admin-menu button.active,
    .admin-menu button:hover {
      background: var(--green-soft);
      color: #145943;
      border-color: #b9dccc;
    }

    .admin-content {
      padding: 16px;
      overflow: auto;
    }

    .admin-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 13px;
    }

    .admin-title h2 {
      margin: 0 0 4px;
      font-size: 22px;
    }

    .admin-title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 12px;
      align-items: start;
    }

    .admin-card {
      padding: 14px;
      margin-bottom: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .admin-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #edf1f5;
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: #667085;
      background: #f8fafc;
      font-size: 12px;
    }

    .login-panel {
      max-width: 520px;
      margin: 40px auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 14px 30px rgba(16, 24, 40, 0.08);
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin: 14px 0;
    }

    .role {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfe;
      padding: 12px 8px;
      text-align: center;
      font-weight: 950;
    }

    .role.active {
      background: var(--green-soft);
      border-color: #b9dccc;
      color: #145943;
    }

    .ring {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      background: var(--red);
      color: #fff;
      font-size: 12px;
      font-weight: 950;
      animation: pulse 1.3s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }

    .chart {
      height: 165px;
      display: flex;
      align-items: end;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding-top: 16px;
    }

    .bar {
      flex: 1;
      min-height: 18px;
      border-radius: 6px 6px 0 0;
      background: #aacfc0;
      position: relative;
    }

    .bar span {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 4px);
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .architecture {
      display: grid;
      gap: 12px;
    }

    .layer {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .layer-title {
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #111827;
      color: #fff;
      font-weight: 950;
    }

    .layer-body {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .layer-body div {
      min-height: 62px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: #344054;
      font-weight: 850;
      font-size: 13px;
    }

    .hidden { display: none !important; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 50;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: #111827;
      color: #fff;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      font-size: 13px;
      font-weight: 900;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    .demo-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(16, 24, 40, 0.42);
    }

    .demo-dialog {
      width: min(520px, 100%);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: 0 24px 70px rgba(16, 24, 40, 0.28);
      overflow: hidden;
    }

    .demo-dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .demo-dialog-head strong {
      font-size: 16px;
    }

    .demo-close {
      width: 32px;

    function render() {

      document.getElementById("nav-title").textContent = group.navTitle;
      document.getElementById("nav").innerHTML = group.items.map(item => `
        <button class="nav-item ${item.key === current ? "active" : ""}" onclick="navTo('${item.key}')">
          <span class="nav-index">${item.index}</span>
          <span>${item.title}</span>
        </button>
      `).join("");

      document.getElementById("stage-title").textContent = page.title;
      document.getElementById("stage-desc").textContent = page.desc;
      document.getElementById("badges").innerHTML = page.badges.map(([color, text]) => `<span class="badge ${color}">${text}</span>`).join("");

        modal("新增后台账号", "已打开账号创建表单，可选择热线接听员、心理咨询师或运营管理员角色。", [

          ["选择角色", "控制页面和数据范围"],
          ["启用账号", "记录管理员操作"]
        ]);
        return;
      }

      if (clean === "新增档案") {
        modal("新增客户档案", "已打开档案创建表单，包含基础信息、紧急联系人、社区标签和隐私授权。", [
          ["基础信息", "姓名、年龄、社区"],
          ["联系人", "亲属/社区网格员"],
          ["隐私授权", "同意后保存"]
        ]);
        return;
      }

      if (clean === "授权查看详情") {
        modal("档案详情已授权", "已模拟管理员授权查看敏感档案，系统同步记录查看人、时间和查看原因。", [
          ["权限校验", "咨询师/管理员"],
          ["查看详情", "心理记录脱敏展示"],
          ["审计日志", "记录本次访问"]
        ]);
        return;
      }

      if (clean === "记录审计") {
        modal("审计记录", "已展示该客户档案最近的查看、修改、导出和授权记录。", [
          ["查看日志", "操作者、时间、动作"],
          ["筛选对象", "客户档案"],
          ["导出审计", "合规留存"]
        ]);
        return;
      }

      if (clean === "绑定新设备") {
        modal("绑定新设备", "已打开设备绑定表单，可录入设备编号、绑定老人、所在社区和紧急联系人。", [
          ["录入编号", "XFR-2026-004"],
          ["绑定老人", "选择客户档案"],
          ["测试呼叫", "确认设备在线"]
        ]);
        return;
      }

      if (clean === "查看详情") {
        modal("服务详情", "已打开服务详情页，包含服务介绍、适用人群、预约规则、注意事项和费用说明。", [
          ["查看服务", "了解服务内容"],
          ["发起预约", "进入统一表单"],
          ["生成工单", "后台受理"]
        ]);
        return;
      }

      modal(label || "演示动作", "该按钮已接入演示反馈。真实开发时会连接对应接口或页面。", [
        ["点击按钮", "触发前端交互"],
        ["业务处理", "写入系统记录"],
        ["后续跟进", "进入工单闭环"]
      ]);
    }

    function showBookingSuccess() {
      bookingSubmitted = true;
      const panel = document.getElementById("booking-success");
      if (panel) {
        panel.classList.remove("hidden");
        panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
      showToast("预约已提交，后台已生成待处理工单");
    }

    document.addEventListener("click", event => {
      const button = event.target.closest("button");
      if (!button || button.hasAttribute("onclick") || button.classList.contains("demo-close")) return;
      event.preventDefault();
      handleDemoButton(button.textContent.trim(), button);
    });

    render();
  </script>
